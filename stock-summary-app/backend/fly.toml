# Fly.io 배포 시: backend 폴더에서 `fly launch` 후 `fly deploy`
# https://fly.io/docs/languages-and-frameworks/docker/

app = "stock-summary-dashboard"
primary_region = "nrt"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
