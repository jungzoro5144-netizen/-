<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주식 요약 대시보드</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
        background: #0b1020;
        color: #e5e7eb;
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 28px;
      }
      .sub {
        color: #94a3b8;
        margin-bottom: 14px;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .btn {
        border: 0;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        background: #1e293b;
        color: #e5e7eb;
        font-weight: 600;
      }
      .btn.active {
        background: #2563eb;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }
      .card {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 10px;
        overflow: hidden;
      }
      .card h2 {
        font-size: 16px;
        margin: 0;
        padding: 12px;
        border-bottom: 1px solid #1f2937;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 8px 10px;
        border-bottom: 1px solid #1f2937;
        font-size: 13px;
        text-align: left;
      }
      th {
        color: #9ca3af;
        font-weight: 600;
      }
      .num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .up {
        color: #f87171;
        font-weight: 700;
      }
      .down {
        color: #60a5fa;
        font-weight: 700;
      }
      .clickable {
        cursor: pointer;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      .forecast-text {
        color: #cbd5e1;
        line-height: 1.45;
      }
      .forecast-preview {
        max-height: 110px;
        overflow: hidden;
      }
      .forecast-toggle {
        background: #0f172a;
        border: 1px solid #1f2937;
        border-radius: 10px;
        padding: 8px 10px;
        color: #e5e7eb;
        font-weight: 800;
        cursor: pointer;
      }
      .forecast-details {
        margin-top: 6px;
        background: #0b1226;
        border: 1px solid #1f2937;
        border-radius: 10px;
        padding: 10px 12px;
        color: #e5e7eb;
        line-height: 1.55;
      }
      .modalBackdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 18px;
      }
      .modalBody {
        width: min(980px, 100%);
        max-height: 86vh;
        overflow: auto;
        background: #0f172a;
        border: 1px solid #1f2937;
        border-radius: 16px;
        padding: 14px 16px 18px;
      }
      .modalHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }
      .modalTitle {
        color: white;
        font-size: 18px;
        font-weight: 800;
      }
      .closeBtn {
        cursor: pointer;
        padding: 6px 10px;
        border-radius: 10px;
        background: #1e293b;
        color: #cbd5e1;
        font-weight: 700;
        border: 1px solid #334155;
      }
      .headlineLink {
        color: #93c5fd;
        text-decoration: none;
      }
      .headlineLink:hover {
        text-decoration: underline;
      }
      .panel {
        margin-top: 14px;
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 10px;
      }
      .panel h2 {
        margin: 0;
        padding: 12px;
        font-size: 16px;
        border-bottom: 1px solid #1f2937;
      }
      .reasons {
        padding: 10px;
        display: grid;
        gap: 10px;
      }
      .reason {
        background: #0f172a;
        border: 1px solid #1f2937;
        border-radius: 8px;
        padding: 10px;
      }
      .reason-title {
        font-weight: 700;
        margin-bottom: 6px;
      }
      .reason-summary {
        color: #cbd5e1;
        margin-bottom: 6px;
        line-height: 1.4;
      }
      .reason ul {
        margin: 0;
        padding-left: 18px;
        color: #94a3b8;
      }
      .muted {
        color: #94a3b8;
      }
      .loading {
        padding: 20px;
      }
      @media (max-width: 1000px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>주식 요약 대시보드</h1>
      <div id="meta" class="sub">데이터 로딩 중...</div>
      <div class="toolbar">
        <button id="btnKR" class="btn active">대한민국</button>
        <button id="btnUS" class="btn">미국</button>
        <button id="btnRefresh" class="btn">새로고침</button>
      </div>
      <div id="content" class="loading">불러오는 중...</div>
    </div>

    <script>
      let market = "KR";
      let reasonByTicker = new Map();
      let forecastsByTicker = {};

      const elContent = document.getElementById("content");
      const elMeta = document.getElementById("meta");
      const btnKR = document.getElementById("btnKR");
      const btnUS = document.getElementById("btnUS");
      const btnRefresh = document.getElementById("btnRefresh");

      const escapeHtml = (str) =>
        String(str ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");

      const fmtNum = (n) => Number(n ?? 0).toLocaleString("ko-KR");
      const fmtPct = (n) => `${n > 0 ? "+" : ""}${Number(n ?? 0).toFixed(2)}%`;
      const nlToBr = (s) => escapeHtml(s).replaceAll("\n", "<br/>");
      const fmtForecast = (f) => {
        if (!f) return "-";
        return nlToBr(f);
      };

      function setMarket(next) {
        market = next;
        btnKR.classList.toggle("active", market === "KR");
        btnUS.classList.toggle("active", market === "US");
        load();
      }

      function renderTable(title, items) {
        const rows = items
          .map((m) => {
            const cls = m.change_pct >= 0 ? "up" : "down";
            return `
              <tr>
                <td>${m.name}</td>
                <td>${m.company_type || "-"}</td>
                <td class="num">${fmtNum(m.close)}</td>
                <td class="num ${cls}">${fmtPct(m.change_pct)}</td>
              </tr>
            `;
          })
          .join("");

        return `
          <section class="card">
            <h2>${title}</h2>
            <table>
              <thead>
                <tr>
                  <th>종목</th>
                  <th>유형</th>
                  <th class="num">종가</th>
                  <th class="num">등락률</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </section>
        `;
      }

      function renderReasons(title, reasons, forecasts) {
        const safeId = (s) => String(s ?? "").replace(/[^a-zA-Z0-9_-]/g, "_");
        const rows = reasons
          .map((r) => {
            const f = forecasts[r.ticker] || {};
            const headlinesDetailed = r.headlines_detailed || [];
            const headlinesHtml = headlinesDetailed.length
              ? `<ul>${headlinesDetailed
                  .slice(0, 3)
                  .map((h) => {
                    const label = `[출처: ${h.source}] ${h.title_ko}`;
                    const url = h.url || "#";
                    return `<li><a class="headlineLink" target="_blank" rel="noreferrer" href="${escapeHtml(url)}">${escapeHtml(label)}</a></li>`;
                  })
                  .join("")}</ul>`
              : `<div class="muted">관련 뉴스 없음</div>`;

            const baseId = safeId(r.ticker);
            const shortBlockId = `${baseId}-short`;
            const midBlockId = `${baseId}-mid`;
            const longBlockId = `${baseId}-long`;

            const shortSummary = f?.short_term?.summary || "-";
            const midSummary = f?.mid_term?.summary || "-";
            const longSummary = f?.long_term?.summary || "-";

            const shortDetails = f?.short_term?.details || "";
            const midDetails = f?.mid_term?.details || "";
            const longDetails = f?.long_term?.details || "";

            return `
              <article class="reason">
                <div class="reason-title">
                  ${escapeHtml(r.name || r.ticker)}<span class="muted" style="font-weight:600;"> · ${escapeHtml(r.company_type || "")}</span>
                </div>
                <div class="reason-summary clickable" data-ticker="${escapeHtml(r.ticker)}">
                  ${nlToBr(r.summary_ko || "요약 없음")}
                </div>
                ${headlinesHtml}

                <div class="forecast-text muted" style="margin-top:10px;">
                  <div style="margin-bottom:6px;"><strong>단기</strong></div>
                  <div class="forecast-toggle clickable" onclick="toggleForecastDetails('${shortBlockId}')">
                    ${escapeHtml(shortSummary)}
                  </div>
                  <div id="${shortBlockId}" class="forecast-details" style="display:none;">
                    ${fmtForecast(shortDetails)}
                  </div>

                  <div style="margin-top:10px; margin-bottom:6px;"><strong>중기</strong></div>
                  <div class="forecast-toggle clickable" onclick="toggleForecastDetails('${midBlockId}')">
                    ${escapeHtml(midSummary)}
                  </div>
                  <div id="${midBlockId}" class="forecast-details" style="display:none;">
                    ${fmtForecast(midDetails)}
                  </div>

                  <div style="margin-top:10px; margin-bottom:6px;"><strong>장기</strong></div>
                  <div class="forecast-toggle clickable" onclick="toggleForecastDetails('${longBlockId}')">
                    ${escapeHtml(longSummary)}
                  </div>
                  <div id="${longBlockId}" class="forecast-details" style="display:none;">
                    ${fmtForecast(longDetails)}
                  </div>
                </div>
              </article>
            `;
          })
          .join("");

        return `
          <section class="panel">
            <h2>${title}</h2>
            <div class="reasons">${rows}</div>
          </section>
        `;
      }

      function openReasonModal(ticker) {
        const r = reasonByTicker.get(ticker);
        const f = forecastsByTicker[ticker] || {};
        if (!r) return;

        const headlinesDetailed = r.headlines_detailed || [];
        const headlinesList = headlinesDetailed.length
          ? headlinesDetailed
              .map((h) => {
                const label = `[출처: ${h.source}] ${h.title_ko}`;
                const url = h.url || "#";
                return `<li><a class="headlineLink" target="_blank" rel="noreferrer" href="${escapeHtml(url)}">${escapeHtml(label)}</a></li>`;
              })
              .join("")
          : `<div class="muted">관련 뉴스 없음</div>`;

        document.getElementById("reasonModalTitle").textContent = `${r.name || r.ticker} · ${r.company_type || ""}`;
        document.getElementById("reasonModalSummary").innerHTML = nlToBr(r.summary_ko || "요약 없음");
        document.getElementById("reasonModalDetails").innerHTML = nlToBr(r.details_ko || "자세한 설명 없음");
        document.getElementById("reasonModalHeadlines").innerHTML = headlinesList.startsWith("<div")
          ? headlinesList
          : `<ul>${headlinesList}</ul>`;
        document.getElementById("reasonModalShort").innerHTML = fmtForecast(f?.short_term?.details || "-");
        document.getElementById("reasonModalMid").innerHTML = fmtForecast(f?.mid_term?.details || "-");
        document.getElementById("reasonModalLong").innerHTML = fmtForecast(f?.long_term?.details || "-");

        document.getElementById("reasonModalBackdrop").style.display = "flex";
      }

      function closeReasonModal() {
        document.getElementById("reasonModalBackdrop").style.display = "none";
      }

      function toggleForecastDetails(id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.style.display = el.style.display === "none" ? "block" : "none";
      }

      async function load() {
        elContent.textContent = "불러오는 중...";
        try {
          const res = await fetch(market === "KR" ? "/kr/daily-report" : "/us/daily-report");
          if (!res.ok) throw new Error(`API 오류 (${res.status})`);
          const d = await res.json();

          const ts = new Date(d.generated_at).toLocaleString("ko-KR", { hour12: false });
          elMeta.textContent = `${d.market_name_ko} 시장 | 생성시각: ${ts}`;

          const combinedReasons = [].concat(d.top_market_cap_reasons || [], d.movers_reasons || []);
          reasonByTicker = new Map(combinedReasons.map((r) => [r.ticker, r]));
          forecastsByTicker = d.forecasts || {};

          elContent.innerHTML = `
            <div class="grid">
              ${renderTable(`상승률 상위 ${(d.top_gainers || []).length}개`, d.top_gainers || [])}
              ${renderTable(`하락률 상위 ${(d.top_losers || []).length}개`, d.top_losers || [])}
              ${renderTable(`시가총액 상위 ${(d.top_market_cap || []).length}개`, d.top_market_cap || [])}
            </div>
            ${renderReasons("상승/하락 주요 사유 + 단/중/장기 전망", d.movers_reasons || [], d.forecasts || {})}
          `;

          // 카드의 "주요 사유" 영역 클릭 → 상세 모달
          elContent.querySelectorAll(".reason-summary").forEach((el) => {
            el.addEventListener("click", () => openReasonModal(el.dataset.ticker));
          });
        } catch (e) {
          elContent.innerHTML = `<div class="loading">오류: ${e.message}</div>`;
        }
      }

      btnKR.addEventListener("click", () => setMarket("KR"));
      btnUS.addEventListener("click", () => setMarket("US"));
      btnRefresh.addEventListener("click", () => load());

      load();
    </script>

    <!-- 상세 모달 (주요 사유/기사 링크/전망) -->
    <div
      id="reasonModalBackdrop"
      class="modalBackdrop"
      style="display: none"
      onclick="closeReasonModal()"
    >
      <div class="modalBody" onclick="event.stopPropagation()">
        <div class="modalHeader">
          <div id="reasonModalTitle" class="modalTitle">상세</div>
          <div class="closeBtn" onclick="closeReasonModal()">닫기</div>
        </div>

        <div class="panel" style="margin-top: 0; border-radius: 12px;">
          <h2 style="border-bottom: 0;">주요 사유 요약</h2>
          <div id="reasonModalSummary" class="reason-summary" style="margin-bottom: 10px;"></div>

          <h2 style="border-bottom: 0;">더 자세한 설명</h2>
          <div id="reasonModalDetails" class="reason-summary" style="margin-bottom: 10px;"></div>

          <h2 style="border-bottom: 0;">참고 기사(클릭 시 원문)</h2>
          <div id="reasonModalHeadlines" style="margin-top: 8px;"></div>

          <h2 style="border-bottom: 0; margin-top: 12px;">전망(긍정/부정)</h2>
          <div class="muted" style="line-height: 1.5;">
            <div><strong>단기</strong></div>
            <div id="reasonModalShort" class="forecast-text"></div>
            <div style="margin-top: 10px;"><strong>중기</strong></div>
            <div id="reasonModalMid" class="forecast-text"></div>
            <div style="margin-top: 10px;"><strong>장기</strong></div>
            <div id="reasonModalLong" class="forecast-text"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
