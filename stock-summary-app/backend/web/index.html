<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주식 요약 대시보드</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
        background: #0b1020;
        color: #e5e7eb;
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 28px;
      }
      .sub {
        color: #94a3b8;
        margin-bottom: 14px;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .indexRow {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .indexCard {
        background: #0f172a;
        border: 1px solid #1f2937;
        border-radius: 12px;
        padding: 10px 12px;
        min-width: 230px;
      }
      .indexLabel {
        color: #cbd5e1;
        font-weight: 900;
      }
      .indexMeta {
        color: #94a3b8;
        font-size: 12px;
        margin-top: 2px;
      }
      .indexValue {
        margin-top: 6px;
        font-size: 16px;
        font-weight: 900;
        color: #e5e7eb;
      }
      .indexChartWrap {
        margin-top: 10px;
        background: #0b1226;
        border: 1px solid #1f2937;
        border-radius: 10px;
        padding: 8px 8px 6px;
      }
      .indexLegend {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 6px;
        font-size: 11px;
        color: #cbd5e1;
      }
      .legendItem {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .legendDot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        display: inline-block;
      }
      .btn {
        border: 0;
        border-radius: 8px;
        padding: 8px 12px;
        cursor: pointer;
        background: #1e293b;
        color: #e5e7eb;
        font-weight: 600;
      }
      .btn.active {
        background: #2563eb;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }
      .card {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 10px;
        overflow: hidden;
      }
      .card h2 {
        font-size: 16px;
        margin: 0;
        padding: 12px;
        border-bottom: 1px solid #1f2937;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 8px 10px;
        border-bottom: 1px solid #1f2937;
        font-size: 13px;
        text-align: left;
      }
      th {
        color: #9ca3af;
        font-weight: 600;
      }
      .num {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .up {
        color: #f87171;
        font-weight: 700;
      }
      .down {
        color: #60a5fa;
        font-weight: 700;
      }
      .hlPos {
        background: rgba(248, 113, 113, 0.16);
        color: #fb7185;
        font-weight: 900;
        padding: 0 6px;
        border-radius: 999px;
      }
      .hlNeg {
        background: rgba(96, 165, 250, 0.16);
        color: #60a5fa;
        font-weight: 900;
        padding: 0 6px;
        border-radius: 999px;
      }
      .hlKey {
        background: rgba(147, 197, 253, 0.14);
        color: #93c5fd;
        font-weight: 900;
        padding: 0 6px;
        border-radius: 999px;
      }
      .clickable {
        cursor: pointer;
        text-decoration: underline;
        text-underline-offset: 3px;
      }
      .forecast-text {
        color: #cbd5e1;
        line-height: 1.45;
      }
      .forecast-preview {
        max-height: 110px;
        overflow: hidden;
      }
      .forecast-toggle {
        background: #0f172a;
        border: 1px solid #1f2937;
        border-radius: 10px;
        padding: 8px 10px;
        color: #e5e7eb;
        font-weight: 800;
        cursor: pointer;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .forecast-details {
        margin-top: 6px;
        background: #0b1226;
        border: 1px solid #1f2937;
        border-radius: 10px;
        padding: 10px 12px;
        color: #e5e7eb;
        line-height: 1.55;
      }
      .modalBackdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 18px;
      }
      .modalBody {
        width: min(980px, 100%);
        max-height: 86vh;
        overflow: auto;
        background: #0f172a;
        border: 1px solid #1f2937;
        border-radius: 16px;
        padding: 14px 16px 18px;
      }
      .modalHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }
      .modalTitle {
        color: white;
        font-size: 18px;
        font-weight: 800;
      }
      .closeBtn {
        cursor: pointer;
        padding: 6px 10px;
        border-radius: 10px;
        background: #1e293b;
        color: #cbd5e1;
        font-weight: 700;
        border: 1px solid #334155;
      }
      .headlineLink {
        color: #93c5fd;
        text-decoration: none;
        display: block;
        padding: 6px 8px;
        border-radius: 10px;
      }
      .headlineLink:hover {
        text-decoration: underline;
        background: rgba(147, 197, 253, 0.08);
      }
      .transBtn {
        background: #1e293b;
        border: 1px solid #334155;
        color: #e5e7eb;
        border-radius: 10px;
        padding: 6px 10px;
        font-weight: 900;
        cursor: pointer;
        white-space: nowrap;
      }
      .transBtn:hover {
        background: #0f172a;
      }
      .headlineEn {
        font-weight: 900;
        color: #e5e7eb;
        line-height: 1.2;
      }
      .headlinePh {
        font-weight: 800;
        color: #93c5fd;
        font-size: 12px;
        margin-top: 2px;
        line-height: 1.2;
      }
      .headlineKo {
        font-weight: 700;
        color: #cbd5e1;
        font-size: 12px;
        margin-top: 2px;
        line-height: 1.25;
      }
      .panel {
        margin-top: 14px;
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 10px;
      }
      .panel h2 {
        margin: 0;
        padding: 12px;
        font-size: 16px;
        border-bottom: 1px solid #1f2937;
      }
      .reasons {
        padding: 10px;
        display: grid;
        gap: 10px;
      }
      .reason {
        background: #0f172a;
        border: 1px solid #1f2937;
        border-radius: 8px;
        padding: 10px;
      }
      .reason-title {
        font-weight: 700;
        margin-bottom: 6px;
      }
      .reason-summary {
        color: #cbd5e1;
        margin-bottom: 6px;
        line-height: 1.4;
      }
      .reason ul {
        margin: 0;
        padding-left: 18px;
        color: #94a3b8;
      }
      .muted {
        color: #94a3b8;
      }
      .loading {
        padding: 20px;
      }
      @media (max-width: 1000px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>주식 요약 대시보드</h1>
      <div id="meta" class="sub">데이터 로딩 중...</div>
      <div id="indexRow" class="indexRow"></div>
      <div class="toolbar">
        <button id="btnKR" class="btn active">대한민국</button>
        <button id="btnUS" class="btn">미국</button>
        <button id="btnRefresh" class="btn">새로고침</button>
      </div>
      <div id="content" class="loading">불러오는 중...</div>
    </div>

    <script>
      let market = "KR";
      let reasonByTicker = new Map();
      let forecastsByTicker = {};
      let currentReport = null;

      let availableVoices = [];
      let voiceByGenderCache = { male: null, female: null };

      const elContent = document.getElementById("content");
      const elMeta = document.getElementById("meta");
      const btnKR = document.getElementById("btnKR");
      const btnUS = document.getElementById("btnUS");
      const btnRefresh = document.getElementById("btnRefresh");
      const btnSpeak = document.getElementById("btnSpeak");
      const btnStop = document.getElementById("btnStop");
      const voiceGenderEl = document.getElementById("voiceGender");
      const voiceRateEl = document.getElementById("voiceRate");
      const voiceStatus = document.getElementById("voiceStatus");
      const indexRowEl = document.getElementById("indexRow");

      function refreshVoices() {
        try {
          availableVoices = speechSynthesis.getVoices() || [];
          voiceByGenderCache = { male: null, female: null };
        } catch (e) {
          availableVoices = [];
        }
      }

      if ("speechSynthesis" in window) {
        refreshVoices();
        speechSynthesis.onvoiceschanged = refreshVoices;
      }

      function pickVoice(gender) {
        const koVoices = (availableVoices || []).filter((v) => (v.lang || "").toLowerCase().startsWith("ko"));
        const candidates = koVoices.length ? koVoices : availableVoices;
        if (!candidates || candidates.length === 0) return null;

        const isFemale = (name = "") => /female|woman|여성|feminine|zira|sara|soyoung|yuna|aria/i.test(name);
        const isMale = (name = "") => /male|man|남성|masculine|hyeon|jinho|daniel|jun|hyun/i.test(name);

        if (gender === "female") {
          const femaleExact = candidates.find((v) => isFemale(v.name || ""));
          if (femaleExact) return femaleExact;
          const nonMale = candidates.find((v) => !isMale(v.name || ""));
          return nonMale || candidates[0] || null;
        }

        // 남성 선택 시 여성 음성으로 잘못 나오는 케이스를 줄이기 위해
        // 1) male 명시 음성 우선 2) female 표기 음성은 제외한 후보 사용
        const maleExact = candidates.find((v) => isMale(v.name || ""));
        if (maleExact) return maleExact;

        const notFemale = candidates.find((v) => !isFemale(v.name || ""));
        return notFemale || candidates[0] || null;
      }

      function normalizeForSpeech(s) {
        return String(s ?? "")
          .replaceAll(/\s+/g, " ")
          .replaceAll(/[\r\n]+/g, " ")
          .trim();
      }

      function stripValidationForSpeech(detailsKo) {
        const s = String(detailsKo ?? "");
        const before = s.split("검증 결과:")[0];
        const before2 = before.split("용어해설:")[0];
        return normalizeForSpeech(before2);
      }

      function buildSpeechText(report, market) {
        if (!report) return "";

        const isKR = market === "KR";
        const gainers = report.top_gainers || [];
        const losers = report.top_losers || [];
        const reasonsAll = [].concat(report.top_market_cap_reasons || [], report.movers_reasons || []);
        const reasonMap = new Map(reasonsAll.map((r) => [r.ticker, r]));

        const title = isKR ? "대한민국 시장" : "미국 시장";
        const speedIntro = "";

        function speakName(nameVal) {
          const s = String(nameVal ?? "");
          return /[A-Za-z]/.test(s) ? phoneticizeEnglish(s) : s;
        }

        let chunks = [];

        // 0) 오늘의 주요 이슈 먼저 브리핑
        const keyIssues = [...gainers.slice(0, 5), ...losers.slice(0, 5)]
          .sort((a, b) => Math.abs(b.change_pct || 0) - Math.abs(a.change_pct || 0))
          .slice(0, 3)
          .map((m) => {
            const r = reasonMap.get(m.ticker);
            const direction = (m.change_pct || 0) >= 0 ? "상승" : "하락";
            const brief = r?.summary_ko ? normalizeForSpeech(r.summary_ko) : "";
            return `${normalizeForSpeech(speakName(m.name))} ${direction} 이슈. ${brief}`;
          });
        chunks.push(`${title} 오늘의 주요 이슈 브리핑입니다. ${normalizeForSpeech(keyIssues.join(" "))}`);

        // 1) 상세 브리핑 - 상승율 상위 10
        let t1 = `${title} 상세 브리핑입니다. 먼저 상승율 상위 ${gainers.length}개 종목입니다. `;
        gainers.slice(0, 10).forEach((m, idx) => {
          const r = reasonMap.get(m.ticker);
          const why = r?.summary_ko ? normalizeForSpeech(r.summary_ko) : "";
          t1 += `${idx + 1}위. ${normalizeForSpeech(speakName(m.name))}. ${why ? "이유: " + why : ""} `;
        });
        chunks.push(normalizeForSpeech(t1) + ".");

        // 2) 상세 브리핑 - 하락율 상위 10
        let t2 = `다음은 하락율 상위 ${losers.length}개 종목입니다. `;
        losers.slice(0, 10).forEach((m, idx) => {
          const r = reasonMap.get(m.ticker);
          const why = r?.summary_ko ? normalizeForSpeech(r.summary_ko) : "";
          t2 += `${idx + 1}위. ${normalizeForSpeech(speakName(m.name))}. ${why ? "이유: " + why : ""} `;
        });
        chunks.push(normalizeForSpeech(t2) + ".");

        // 3) 상세 브리핑 - 상승/하락 주요 내용
        const gainersMain = gainers.slice(0, 3).map((m) => {
          const r = reasonMap.get(m.ticker);
          return `${normalizeForSpeech(speakName(m.name))} 중요 포인트: ${stripValidationForSpeech(r?.details_ko)}.`;
        });
        const losersMain = losers.slice(0, 3).map((m) => {
          const r = reasonMap.get(m.ticker);
          return `${normalizeForSpeech(speakName(m.name))} 중요 포인트: ${stripValidationForSpeech(r?.details_ko)}.`;
        });

        chunks.push(`상승 주요 내용입니다. ${normalizeForSpeech(gainersMain.join(" "))}`);
        chunks.push(`하락 주요 내용입니다. ${normalizeForSpeech(losersMain.join(" "))}`);

        return chunks.filter(Boolean);
      }

      function speakOne(text, gender, rate) {
        return new Promise((resolve) => {
          if (!text || !("speechSynthesis" in window)) return resolve();

          speechSynthesis.cancel();
          const utter = new SpeechSynthesisUtterance(text);
          utter.lang = "ko-KR";
          utter.rate = rate;
          utter.pitch = gender === "female" ? 1.15 : 0.9;
          const v = pickVoice(gender);
          if (v) utter.voice = v;
          if (voiceStatus && v) {
            voiceStatus.textContent = `음성으로 읽는 중입니다... (${gender === "female" ? "여성" : "남성"} / ${v.name})`;
          }
          utter.onend = () => resolve();
          utter.onerror = () => resolve();
          speechSynthesis.speak(utter);
        });
      }

      async function speakSequence(textChunks, gender, rate) {
        if (!textChunks || !textChunks.length) {
          voiceStatus.textContent = "읽을 내용이 없습니다. 먼저 데이터를 불러오세요.";
          return;
        }
        voiceStatus.textContent = "음성으로 읽는 중입니다...";
        for (const ch of textChunks) {
          // 너무 긴 문장은 끊길 수 있어 짧게 쪼갬
          const parts = String(ch).split(/(?<=[.!?])\s+/).filter(Boolean);
          const small = parts.length ? parts : [ch];
          for (const s of small.slice(0, 8)) {
            // rate/pitch 적용 유지
            // eslint-disable-next-line no-await-in-loop
            await speakOne(s, gender, rate);
          }
        }
        voiceStatus.textContent = "읽기 완료";
      }

      const escapeHtml = (str) =>
        String(str ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");

      const fmtNum = (n) => Number(n ?? 0).toLocaleString("ko-KR");
      const fmtPct = (n) => `${n > 0 ? "+" : ""}${Number(n ?? 0).toFixed(2)}%`;
      function emphasizeText(s) {
        let out = escapeHtml(s ?? "");
        // 핵심 키워드(초보자용) 강조
        out = out.replaceAll("검증", `<span class="hlKey"><b>검증</b></span>`);
        out = out.replaceAll("통과", `<span class="hlKey"><b>통과</b></span>`);
        out = out.replaceAll("제외", `<span class="hlNeg"><b>제외</b></span>`);
        out = out.replaceAll("상승", `<span class="hlPos"><b>상승</b></span>`);
        out = out.replaceAll("하락", `<span class="hlNeg"><b>하락</b></span>`);
        out = out.replaceAll("긍정", `<span class="hlPos"><b>긍정</b></span>`);
        out = out.replaceAll("부정", `<span class="hlNeg"><b>부정</b></span>`);
        out = out.replaceAll("실적", `<span class="hlKey"><b>실적</b></span>`);
        out = out.replaceAll("가이던스", `<span class="hlKey"><b>가이던스</b></span>`);
        out = out.replaceAll("수급", `<span class="hlKey"><b>수급</b></span>`);
        out = out.replaceAll("금리", `<span class="hlKey"><b>금리</b></span>`);
        out = out.replaceAll("환율", `<span class="hlKey"><b>환율</b></span>`);
        out = out.replaceAll("원가", `<span class="hlKey"><b>원가</b></span>`);
        out = out.replaceAll("마진", `<span class="hlKey"><b>마진</b></span>`);
        out = out.replaceAll("밸류에이션", `<span class="hlKey"><b>밸류에이션</b></span>`);
        out = out.replaceAll("설비투자", `<span class="hlKey"><b>설비투자</b></span>`);
        out = out.replaceAll("운전자본", `<span class="hlKey"><b>운전자본</b></span>`);
        out = out.replaceAll("현금흐름", `<span class="hlKey"><b>현금흐름</b></span>`);
        out = out.replaceAll("우려", `<span class="hlNeg"><b>우려</b></span>`);
        out = out.replaceAll("리스크", `<span class="hlNeg"><b>리스크</b></span>`);
        out = out.replaceAll("부담", `<span class="hlNeg"><b>부담</b></span>`);
        out = out.replaceAll("재평가", `<span class="hlPos"><b>재평가</b></span>`);
        return out.replaceAll("\n", "<br/>");
      }
      const nlToBr = (s) => emphasizeText(s);
      const fmtForecast = (f) => {
        if (!f) return "-";
        return emphasizeText(f);
      };

      const letterMap = {
        a: "에이",
        b: "비",
        c: "씨",
        d: "디",
        e: "이",
        f: "에프",
        g: "지",
        h: "에이치",
        i: "아이",
        j: "제이",
        k: "케이",
        l: "엘",
        m: "엠",
        n: "엔",
        o: "오",
        p: "피",
        q: "큐",
        r: "알",
        s: "에스",
        t: "티",
        u: "유",
        v: "브이",
        w: "더블유",
        x: "엑스",
        y: "와이",
        z: "지",
      };

      const commonWordPron = {
        earnings: "어닝스",
        guidance: "가이던스",
        revenue: "리븐뉴",
        research: "리서치",
        study: "스터디",
        paper: "페이퍼",
        evidence: "이비던스",
        breakthrough: "브레이크스루",
        validated: "밸리데이티드",
        benchmark: "벤치마크",
        peerreviewed: "피어리뷰드",
        "peer-reviewed": "피어리뷰드",
        SEC: "에스이씨",
        IR: "아이알",
        Nasdaq: "나스닥",
      };

      function phoneticizeEnglish(en) {
        const raw = String(en ?? "").trim();
        if (!raw) return "";
        const lower = raw.toLowerCase();
        if (commonWordPron[raw] !== undefined) return commonWordPron[raw];
        if (commonWordPron[lower] !== undefined) return commonWordPron[lower];

        const translitToken = (token) => {
          const cleaned = token.replace(/[^A-Za-z]/g, "");
          if (!cleaned) return token;
          const s = cleaned.toLowerCase();

          // 자주 등장하는 조합(발음 근사)을 우선 치환
          const patterns = [
            ["tion", "션"],
            ["sion", "션"],
            ["ture", "처"],
            ["tch", "치"],
            ["ch", "치"],
            ["sh", "시"],
            ["th", s.startsWith("th") ? "더" : "스"],
            ["ph", "프"],
            ["ng", "응"],
            ["ck", "크"],
            ["qu", "쿠"],
            ["ai", "에이"],
            ["ay", "에이"],
            ["ee", "이"],
            ["ea", "이"],
            ["oo", "우"],
            ["ou", "아우"],
            ["oi", "오이"],
            ["ua", "우아"],
            ["ar", "아르"],
            ["or", "오르"],
            ["er", "어"],
            ["ir", "이르"],
            ["ur", "어"],
            ["al", "알"],
            ["el", "엘"],
            ["il", "일"],
          ];

          const vowelMap = { a: "애", e: "에", i: "이", o: "오", u: "우", y: "이" };
          const consonantDefault = {
            b: "브",
            c: "크",
            d: "디",
            f: "에프",
            g: "그",
            h: "에이치",
            j: "제이",
            k: "케이",
            l: "엘",
            m: "엠",
            n: "엔",
            p: "피",
            q: "큐",
            r: "아르",
            s: "에스",
            t: "티",
            v: "브이",
            w: "더블유",
            x: "엑스",
            z: "지",
          };

          let out = "";
          let i = 0;
          while (i < s.length) {
            let matched = false;
            for (const [pat, rep] of patterns) {
              if (s.startsWith(pat, i)) {
                out += rep;
                i += pat.length;
                matched = true;
                break;
              }
            }
            if (matched) continue;

            const ch = s[i];
            const next = s[i + 1] || "";
            if (vowelMap[ch]) {
              out += vowelMap[ch];
            } else if (ch === "c") {
              // c는 e/i 앞이면 '씨', 그 외는 '크'로 근사
              out += ["e", "i", "y"].includes(next) ? "씨" : "크";
            } else {
              out += consonantDefault[ch] || ch;
            }
            i += 1;
          }
          return out;
        };

        // 문장/구두점 포함 시 토큰 단위로 처리
        const tokens = raw.split(/(\s+)/);
        return tokens
          .map((t) => {
            if (/^\s+$/.test(t)) return t;
            return translitToken(t);
          })
          .join("")
          .replaceAll(/\s+/g, " ");
      }

      function renderEnglishTriplet(en, ko) {
        const english = String(en ?? "");
        const koLine = String(ko ?? "");
        const ph = phoneticizeEnglish(english);
        return `
          <div>
            <div class="headlineEn">${escapeHtml(english)}</div>
            <div class="headlinePh">${escapeHtml(ph)}</div>
            <div class="headlineKo">${escapeHtml(koLine || ph)}</div>
          </div>
        `;
      }

      function renderEnglishWithToggle(en, ko, detailId, sourceLabel = "", url = "") {
        const english = String(en ?? "");
        const koLine = String(ko ?? "");
        const ph = phoneticizeEnglish(english);
        const srcHtml = sourceLabel ? `<div class="muted" style="font-weight:800; margin-bottom:4px;">${escapeHtml(sourceLabel)}</div>` : "";
        const titleHtml = url
          ? `<a class="headlineLink" target="_blank" rel="noreferrer" href="${escapeHtml(url)}"><div class="headlineEn">${escapeHtml(english)}</div></a>`
          : `<div class="headlineEn">${escapeHtml(english)}</div>`;
        return `
          <div style="display:flex; gap:10px; align-items:flex-start; justify-content:space-between;">
            <div style="flex:1;">
              ${srcHtml}
              ${titleHtml}
            </div>
            <button class="transBtn" onclick="event.preventDefault(); event.stopPropagation(); toggleEnglishDetail('${escapeHtml(detailId)}');">
              번역
            </button>
          </div>
          <div id="${escapeHtml(detailId)}" class="muted" style="display:none; margin-top:6px;">
            <div class="headlinePh">${escapeHtml(ph)}</div>
            <div class="headlineKo">${escapeHtml(koLine || ph)}</div>
          </div>
        `;
      }

      function setMarket(next) {
        market = next;
        btnKR.classList.toggle("active", market === "KR");
        btnUS.classList.toggle("active", market === "US");
        load();
      }

      function renderTable(title, items) {
        const rows = items
          .map((m) => {
            const cls = m.change_pct >= 0 ? "up" : "down";
            const nameVal = String(m.name ?? "");
            const nameHtml = /[A-Za-z]/.test(nameVal) ? escapeHtml(m.name_ko || nameVal) : escapeHtml(nameVal);
            return `
              <tr>
                <td>${nameHtml}</td>
                <td>${m.company_type || "-"}</td>
                <td class="num">${fmtNum(m.close)}</td>
                <td class="num ${cls}">${fmtPct(m.change_pct)}</td>
              </tr>
            `;
          })
          .join("");

        return `
          <section class="card">
            <h2>${title}</h2>
            <table>
              <thead>
                <tr>
                  <th>종목</th>
                  <th>유형</th>
                  <th class="num">종가</th>
                  <th class="num">등락률</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </section>
        `;
      }

      function renderReasons(title, reasons, forecasts) {
        const safeId = (s) => String(s ?? "").replace(/[^a-zA-Z0-9_-]/g, "_");
        const rows = reasons
          .map((r) => {
            const f = forecasts[r.ticker] || {};
            const headlinesDetailed = r.headlines_detailed || [];
            const baseId = safeId(r.ticker);
            const headlinesHtml = headlinesDetailed.length
              ? `<ul>${headlinesDetailed
                  .slice(0, 3)
                  .map((h, idx) => {
                    const url = h.url || "#";
                    const en = h.title_raw || h.title_ko || "";
                    const ko = h.title_ko || "";
                    const detailId = `${baseId}-hl-${idx}`;
                    const src = h.source ? `[출처: ${h.source}]` : "";
                    return `
                      <li>
                        ${renderEnglishWithToggle(en, ko, detailId, src, url)}
                      </li>
                    `;
                  })
                  .join("")}</ul>`
              : `<div class="muted">관련 뉴스 없음</div>`;
            const shortBlockId = `${baseId}-short`;
            const midBlockId = `${baseId}-mid`;
            const longBlockId = `${baseId}-long`;

            const shortSummary = f?.short_term?.summary || "-";
            const midSummary = f?.mid_term?.summary || "-";
            const longSummary = f?.long_term?.summary || "-";

            const shortDetails = f?.short_term?.details || "";
            const midDetails = f?.mid_term?.details || "";
            const longDetails = f?.long_term?.details || "";
            const nameVal = String(r.name || r.ticker || "");
            const nameHtml = /[A-Za-z]/.test(nameVal) ? escapeHtml(r.name_ko || nameVal) : escapeHtml(nameVal);

            return `
              <article class="reason">
                <div class="reason-title">
                  ${nameHtml}<span class="muted" style="font-weight:600;"> · ${escapeHtml(r.company_type || "")}</span>
                </div>
                <div class="reason-summary clickable" data-ticker="${escapeHtml(r.ticker)}">
                  ${nlToBr(r.summary_ko || "요약 없음")}
                </div>
                ${headlinesHtml}

                <div class="forecast-text muted" style="margin-top:10px;">
                  <div style="margin-bottom:6px;"><strong>단기</strong></div>
                  <div class="forecast-toggle clickable" onclick="toggleForecastDetails('${shortBlockId}')">
                    ${escapeHtml(shortSummary)}
                  </div>
                  <div id="${shortBlockId}" class="forecast-details" style="display:none;">
                    ${fmtForecast(shortDetails)}
                  </div>

                  <div style="margin-top:10px; margin-bottom:6px;"><strong>중기</strong></div>
                  <div class="forecast-toggle clickable" onclick="toggleForecastDetails('${midBlockId}')">
                    ${escapeHtml(midSummary)}
                  </div>
                  <div id="${midBlockId}" class="forecast-details" style="display:none;">
                    ${fmtForecast(midDetails)}
                  </div>

                  <div style="margin-top:10px; margin-bottom:6px;"><strong>장기</strong></div>
                  <div class="forecast-toggle clickable" onclick="toggleForecastDetails('${longBlockId}')">
                    ${escapeHtml(longSummary)}
                  </div>
                  <div id="${longBlockId}" class="forecast-details" style="display:none;">
                    ${fmtForecast(longDetails)}
                  </div>
                </div>
              </article>
            `;
          })
          .join("");

        return `
          <section class="panel">
            <h2>${title}</h2>
            <div class="reasons">${rows}</div>
          </section>
        `;
      }

      function openReasonModal(ticker) {
        const r = reasonByTicker.get(ticker);
        const f = forecastsByTicker[ticker] || {};
        if (!r) return;

        const headlinesDetailed = r.headlines_detailed || [];
        const safeId = (s) => String(s ?? "").replace(/[^a-zA-Z0-9_-]/g, "_");
        const baseId = safeId(ticker);
        const headlinesList = headlinesDetailed.length
          ? headlinesDetailed
              .map((h, idx) => {
                const url = h.url || "#";
                const en = h.title_raw || h.title_ko || "";
                const ko = h.title_ko || "";
                const detailId = `${baseId}-m-hl-${idx}`;
                const src = h.source ? `[출처: ${h.source}]` : "";
                return `
                  <li>
                    ${renderEnglishWithToggle(en, ko, detailId, src, url)}
                  </li>
                `;
              })
              .join("")
          : `<div class="muted">관련 뉴스 없음</div>`;

        const nameVal = String(r.name || r.ticker || "");
        const nameHtml = /[A-Za-z]/.test(nameVal) ? escapeHtml(r.name_ko || nameVal) : escapeHtml(nameVal);
        document.getElementById("reasonModalTitle").innerHTML = `${nameHtml}<span class="muted" style="font-weight:700; margin-left:8px;">${escapeHtml(
          r.company_type || ""
        )}</span>`;
        document.getElementById("reasonModalSummary").innerHTML = nlToBr(r.summary_ko || "요약 없음");
        document.getElementById("reasonModalDetails").innerHTML = nlToBr(r.details_ko || "자세한 설명 없음");
        document.getElementById("reasonModalHeadlines").innerHTML = headlinesList.startsWith("<div")
          ? headlinesList
          : `<ul>${headlinesList}</ul>`;
        document.getElementById("reasonModalShort").innerHTML = fmtForecast(f?.short_term?.details || "-");
        document.getElementById("reasonModalMid").innerHTML = fmtForecast(f?.mid_term?.details || "-");
        document.getElementById("reasonModalLong").innerHTML = fmtForecast(f?.long_term?.details || "-");

        document.getElementById("reasonModalBackdrop").style.display = "flex";
      }

      function closeReasonModal() {
        document.getElementById("reasonModalBackdrop").style.display = "none";
      }

      function toggleEnglishDetail(id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.style.display = el.style.display === "none" ? "block" : "none";
      }

      function toggleForecastDetails(id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.style.display = el.style.display === "none" ? "block" : "none";
      }

      function renderIndexes(indexes) {
        if (!indexRowEl) return;
        const k = indexes?.KOSPI;
        const kd = indexes?.KOSDAQ;
        const n = indexes?.NASDAQ;
        const yearColors = ["#60a5fa", "#34d399", "#f59e0b", "#f472b6"];

        function buildLinePoints(months, minV, maxV, width, height, pad) {
          const innerW = width - pad * 2;
          const innerH = height - pad * 2;
          return months
            .map((v, i) => {
              const x = pad + (i / 11) * innerW;
              const ratio = maxV === minV ? 0.5 : (v - minV) / (maxV - minV);
              const y = pad + (1 - ratio) * innerH;
              return `${x.toFixed(2)},${y.toFixed(2)}`;
            })
            .join(" ");
        }

        function renderIndexChart(v) {
          const hist = Array.isArray(v?.history) ? v.history : [];
          if (!hist.length) return "";
          const width = 320;
          const height = 130;
          const pad = 14;
          const allVals = hist.flatMap((h) => (h.months || []).map((x) => Number(x || 0))).filter((x) => Number.isFinite(x));
          const minV = allVals.length ? Math.min(...allVals) : 0;
          const maxV = allVals.length ? Math.max(...allVals) : 1;

          const monthTicks = ["1", "3", "5", "7", "9", "11", "12"]
            .map((m, idx) => {
              const x = pad + ((Number(m) - 1) / 11) * (width - pad * 2);
              return `<text x="${x.toFixed(1)}" y="${height - 2}" fill="#64748b" font-size="9" text-anchor="middle">${m}월</text>`;
            })
            .join("");

          const lines = hist
            .map((h, idx) => {
              const pts = buildLinePoints((h.months || []).map((x) => Number(x || 0)), minV, maxV, width, height, pad);
              return `<polyline fill="none" stroke="${yearColors[idx % yearColors.length]}" stroke-width="2.2" points="${pts}" />`;
            })
            .join("");

          const legend = hist
            .map(
              (h, idx) =>
                `<span class="legendItem"><span class="legendDot" style="background:${yearColors[idx % yearColors.length]};"></span>${escapeHtml(
                  String(h.year)
                )}년</span>`
            )
            .join("");

          return `
            <div class="indexChartWrap">
              <svg viewBox="0 0 ${width} ${height}" width="100%" height="130" preserveAspectRatio="none">
                <rect x="${pad}" y="${pad}" width="${width - pad * 2}" height="${height - pad * 2}" fill="none" stroke="#1f2937" stroke-width="1" />
                ${lines}
                ${monthTicks}
              </svg>
              <div class="indexLegend">${legend}</div>
            </div>
          `;
        }

        const card = (v) => {
          if (!v) return "";
          const cls = Number(v.change_pct || 0) >= 0 ? "up" : "down";
          const pct = fmtPct(Number(v.change_pct || 0));
          return `
            <div class="indexCard">
              <div class="indexLabel">${escapeHtml(v.label || "")}</div>
              <div class="indexMeta">${escapeHtml(v.ticker || "")}</div>
              <div class="indexValue">${fmtNum(v.close || 0)} <span class="${cls}" style="margin-left:8px;">${pct}</span></div>
              ${renderIndexChart(v)}
            </div>
          `;
        };
        indexRowEl.innerHTML = `${card(k)}${card(kd)}${card(n)}`;
      }

      async function load() {
        elContent.textContent = "불러오는 중...";
        try {
          const res = await fetch(market === "KR" ? "/kr/daily-report" : "/us/daily-report");
          if (!res.ok) throw new Error(`API 오류 (${res.status})`);
          const d = await res.json();
          currentReport = d;
          renderIndexes(d.market_indexes || {});

          const ts = new Date(d.generated_at).toLocaleString("ko-KR", { hour12: false });
          elMeta.textContent = `${d.market_name_ko} 시장 | 생성시각: ${ts}`;

          const combinedReasons = [].concat(d.top_market_cap_reasons || [], d.movers_reasons || []);
          reasonByTicker = new Map(combinedReasons.map((r) => [r.ticker, r]));
          forecastsByTicker = d.forecasts || {};

          elContent.innerHTML = `
            <div class="grid">
              ${renderTable(`상승률 상위 ${(d.top_gainers || []).length}개`, d.top_gainers || [])}
              ${renderTable(`하락률 상위 ${(d.top_losers || []).length}개`, d.top_losers || [])}
              ${renderTable(`시가총액 상위 ${(d.top_market_cap || []).length}개`, d.top_market_cap || [])}
            </div>
            ${renderReasons("상승/하락 주요 사유 + 단/중/장기 전망", d.movers_reasons || [], d.forecasts || {})}
          `;

          // 카드의 "주요 사유" 영역 클릭 → 상세 모달
          elContent.querySelectorAll(".reason-summary").forEach((el) => {
            el.addEventListener("click", () => openReasonModal(el.dataset.ticker));
          });
        } catch (e) {
          elContent.innerHTML = `<div class="loading">오류: ${e.message}</div>`;
        }
      }

      btnKR.addEventListener("click", () => setMarket("KR"));
      btnUS.addEventListener("click", () => setMarket("US"));
      btnRefresh.addEventListener("click", () => load());

      load();
    </script>

    <!-- 상세 모달 (주요 사유/기사 링크/전망) -->
    <div
      id="reasonModalBackdrop"
      class="modalBackdrop"
      style="display: none"
      onclick="closeReasonModal()"
    >
      <div class="modalBody" onclick="event.stopPropagation()">
        <div class="modalHeader">
          <div id="reasonModalTitle" class="modalTitle">상세</div>
          <div class="closeBtn" onclick="closeReasonModal()">닫기</div>
        </div>

        <div class="panel" style="margin-top: 0; border-radius: 12px;">
          <h2 style="border-bottom: 0;">주요 사유 요약</h2>
          <div id="reasonModalSummary" class="reason-summary" style="margin-bottom: 10px;"></div>

          <h2 style="border-bottom: 0;">더 자세한 설명</h2>
          <div id="reasonModalDetails" class="reason-summary" style="margin-bottom: 10px;"></div>

          <h2 style="border-bottom: 0;">참고 기사(클릭 시 원문)</h2>
          <div id="reasonModalHeadlines" style="margin-top: 8px;"></div>

          <h2 style="border-bottom: 0; margin-top: 12px;">전망(긍정/부정)</h2>
          <div class="muted" style="line-height: 1.5;">
            <div><strong>단기</strong></div>
            <div id="reasonModalShort" class="forecast-text"></div>
            <div style="margin-top: 10px;"><strong>중기</strong></div>
            <div id="reasonModalMid" class="forecast-text"></div>
            <div style="margin-top: 10px;"><strong>장기</strong></div>
            <div id="reasonModalLong" class="forecast-text"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
